<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Nucleo convierte texto caótico, transcripciones y documentos en mapas de acción claros y estructurados." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#FAFAFA" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Nucleo</title>
    <script>
      (function () {
        var theme = localStorage.getItem("theme");
        var isDark =
          theme === "dark" ||
          (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) {
          document.documentElement.classList.add("dark");
        }
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", isDark ? "#1A1A1A" : "#FAFAFA");
        document
          .querySelector('meta[name="apple-mobile-web-app-status-bar-style"]')
          ?.setAttribute("content", isDark ? "black-translucent" : "default");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
