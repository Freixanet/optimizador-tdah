<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom Icon – Persistence of Vision</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #06060e;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
    }

    canvas {
      display: block;
      border-radius: 50%;
    }

    /* Ambient glow behind the canvas */
    .glow-wrap {
      position: relative;
    }
    .glow-wrap::before {
      content: '';
      position: absolute;
      inset: -30%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100, 180, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse-ambient 4s ease-in-out infinite;
    }

    @keyframes pulse-ambient {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.08); }
    }
  </style>
</head>
<body>

<div class="glow-wrap">
  <canvas id="atom"></canvas>
</div>

<script>
// ── Configuration ──────────────────────────────────────────────────
const CFG = {
  size:            400,          // canvas px  (retina-aware internally)
  orbits:          3,            // number of orbital planes
  particlesPerOrbit: 18,        // particles per orbit
  semiMajor:       0.38,        // ellipse a  (fraction of half-size)
  semiMinor:       0.12,        // ellipse b  (fraction of half-size)
  speed:           0.012,       // base angular speed (rad / frame)
  trailAlpha:      0.045,       // lower = longer persistence trails
  particleRadius:  2.2,
  glowRadius:      12,
  nucleusRadius:   6,
  nucleusPulseAmp: 2.5,
  hueBase:         200,         // starting hue (cyan-ish)
  hueRange:        60,          // spread across orbits
};

// ── Canvas bootstrap ───────────────────────────────────────────────
const canvas = document.getElementById('atom');
const ctx    = canvas.getContext('2d');
const dpr    = Math.min(window.devicePixelRatio || 1, 2);

canvas.width  = CFG.size * dpr;
canvas.height = CFG.size * dpr;
canvas.style.width  = CFG.size + 'px';
canvas.style.height = CFG.size + 'px';
ctx.scale(dpr, dpr);

const cx = CFG.size / 2;
const cy = CFG.size / 2;

// ── Build orbits ───────────────────────────────────────────────────
const orbits = [];
for (let i = 0; i < CFG.orbits; i++) {
  const tilt = (Math.PI / CFG.orbits) * i;      // evenly spaced tilts
  const hue  = CFG.hueBase + (CFG.hueRange / CFG.orbits) * i;
  const particles = [];

  for (let j = 0; j < CFG.particlesPerOrbit; j++) {
    const phase = (Math.PI * 2 / CFG.particlesPerOrbit) * j + Math.random() * 0.3;
    // Slight speed variation so particles don't clump permanently
    const speedMul = 0.92 + Math.random() * 0.16;
    particles.push({ phase, speedMul, brightness: 0.7 + Math.random() * 0.3 });
  }

  orbits.push({ tilt, hue, particles });
}

// ── Motion-blur offscreen buffer ───────────────────────────────────
const blurCanvas  = document.createElement('canvas');
blurCanvas.width  = canvas.width;
blurCanvas.height = canvas.height;
const blurCtx     = blurCanvas.getContext('2d');
blurCtx.scale(dpr, dpr);

// ── Helpers ────────────────────────────────────────────────────────
function ellipsePoint(a, b, angle, tilt) {
  // Parametric ellipse rotated by `tilt` in the plane
  const ex = a * Math.cos(angle);
  const ey = b * Math.sin(angle);
  return {
    x: cx + ex * Math.cos(tilt) - ey * Math.sin(tilt),
    y: cy + ex * Math.sin(tilt) + ey * Math.cos(tilt),
  };
}

function drawGlowDot(context, x, y, r, glowR, hue, alpha, brightness) {
  const col = `hsla(${hue}, 90%, ${55 + brightness * 25}%, ${alpha})`;
  const glowCol = `hsla(${hue}, 100%, 70%, ${alpha * 0.45})`;

  // Outer glow
  context.beginPath();
  const grad = context.createRadialGradient(x, y, 0, x, y, glowR);
  grad.addColorStop(0, glowCol);
  grad.addColorStop(1, 'transparent');
  context.fillStyle = grad;
  context.arc(x, y, glowR, 0, Math.PI * 2);
  context.fill();

  // Core dot
  context.beginPath();
  context.fillStyle = col;
  context.arc(x, y, r, 0, Math.PI * 2);
  context.fill();
}

// ── Nucleus ────────────────────────────────────────────────────────
function drawNucleus(t) {
  const pulse = Math.sin(t * 0.03) * CFG.nucleusPulseAmp;
  const r     = CFG.nucleusRadius + pulse;

  // Multi-layer glow
  for (let layer = 3; layer >= 0; layer--) {
    const lr = r + layer * 8;
    const la = [0.35, 0.15, 0.07, 0.03][layer];
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, lr);
    grad.addColorStop(0, `hsla(210, 100%, 85%, ${la})`);
    grad.addColorStop(0.5, `hsla(220, 100%, 65%, ${la * 0.5})`);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.fillStyle = grad;
    ctx.arc(cx, cy, lr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Solid bright center
  ctx.beginPath();
  ctx.fillStyle = `hsla(210, 60%, 95%, 0.95)`;
  ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
  ctx.fill();
}

// ── Orbital ellipse ghost lines ────────────────────────────────────
function drawOrbitPath(tilt, hue) {
  const a = CFG.semiMajor * (CFG.size / 2);
  const b = CFG.semiMinor * (CFG.size / 2);
  const steps = 120;

  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const angle = (Math.PI * 2 / steps) * i;
    const { x, y } = ellipsePoint(a, b, angle, tilt);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = `hsla(${hue}, 70%, 50%, 0.06)`;
  ctx.lineWidth   = 1;
  ctx.stroke();
}

// ── Main loop ──────────────────────────────────────────────────────
let frame = 0;

function render() {
  frame++;

  // ── Persistence-of-vision: fade previous frame ──
  // Draw to offscreen blur buffer first, then composite
  blurCtx.globalCompositeOperation = 'source-over';
  blurCtx.fillStyle = `rgba(6, 6, 14, ${CFG.trailAlpha})`;
  blurCtx.fillRect(0, 0, CFG.size, CFG.size);

  const a = CFG.semiMajor * (CFG.size / 2);
  const b = CFG.semiMinor * (CFG.size / 2);

  // ── Draw particles onto blur buffer ──
  blurCtx.globalCompositeOperation = 'lighter'; // additive blending for glow

  for (const orbit of orbits) {
    for (const p of orbit.particles) {
      p.phase += CFG.speed * p.speedMul;

      // Motion-blur: draw multiple sub-steps per frame
      const subSteps = 4;
      for (let s = 0; s < subSteps; s++) {
        const subAngle = p.phase - (CFG.speed * p.speedMul / subSteps) * s;
        const { x, y } = ellipsePoint(a, b, subAngle, orbit.tilt);
        const subAlpha = (1 - s / subSteps) * 0.65;

        drawGlowDot(
          blurCtx, x, y,
          CFG.particleRadius * (1 - s * 0.15),
          CFG.glowRadius * (1 - s * 0.2),
          orbit.hue + Math.sin(p.phase) * 15,
          subAlpha,
          p.brightness
        );
      }
    }
  }

  // ── Composite blur buffer onto main canvas ──
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(6, 6, 14, 1)`;
  ctx.fillRect(0, 0, CFG.size, CFG.size);

  // Faint orbit paths
  for (const orbit of orbits) {
    drawOrbitPath(orbit.tilt, orbit.hue);
  }

  // Persistence trails
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(blurCanvas, 0, 0, CFG.size, CFG.size);

  // Nucleus on top
  ctx.globalCompositeOperation = 'lighter';
  drawNucleus(frame);

  // Reset composite
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(render);
}

// ── Kickstart ──────────────────────────────────────────────────────
// Pre-fill the trail buffer so we don't start blank
ctx.fillStyle = `rgba(6, 6, 14, 1)`;
ctx.fillRect(0, 0, CFG.size, CFG.size);
blurCtx.fillStyle = `rgba(6, 6, 14, 1)`;
blurCtx.fillRect(0, 0, CFG.size, CFG.size);

render();
</script>
</body>
</html>
